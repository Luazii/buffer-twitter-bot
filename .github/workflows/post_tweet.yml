name: Run Buffer Automated Twitter Bot

on:
  schedule:
    # Run once a day at 08:00 UTC to generate and queue 5 posts for the day.
    # Buffer queue schedule will publish these throughout the day at your best times.
    - cron: '0 8 * * *'
  
  # Allow manual execution of the workflow from the Actions tab in GitHub.
  workflow_dispatch:

# Grant write permissions to the repository contents so the action can push history.json changes back.
permissions:
  contents: write

jobs:
  post-tweet:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # persist-credentials must be true to allow pushing commits back to the repo
          persist-credentials: true

      # Step 2: Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Cache pip dependencies for faster runs

      # Step 3: Install dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # Step 4: Run the Bot
      - name: Generate and Queue Tweet to Buffer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL || 'gemini-2.5-flash' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4o-mini' }}
          BUFFER_API_KEY: ${{ secrets.BUFFER_API_KEY }}
          BUFFER_CHANNEL_ID: ${{ secrets.BUFFER_CHANNEL_ID }}
        run: |
          python main.py --run --count 5

      # Step 5: Commit and Push updated history.json
      - name: Commit and Push History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add history.json
          
          # Only commit and push if there are actual changes (git diff-index exits with 1 if changes are found)
          if ! git diff-index --quiet HEAD --; then
            git commit -m "chore: update post history [skip ci]"
            git push
            echo "History successfully committed and pushed back to the repository."
          else
            echo "No changes in post history to commit."
          fi
